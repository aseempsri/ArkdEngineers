<section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden">
  <div class="relative z-10 text-center max-w-5xl mx-auto px-4 sm:px-6">
    <!-- Badge -->
    <div
      @fadeUp
      class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-border bg-card/40 backdrop-blur-sm mb-8"
      style="animation-delay: 0.5s">
      <span class="w-2 h-2 rounded-full bg-accent animate-pulse"></span>
      <span class="text-xs font-medium text-muted-foreground tracking-wider uppercase">
        Smart Security Solutions
      </span>
    </div>

    <!-- Main Title -->
    <h1
      @fadeUp40
      class="text-4xl sm:text-6xl lg:text-8xl font-black tracking-tight leading-none mb-6"
      style="animation-delay: 0.7s">
      <span class="text-foreground">ARKD</span>
      <br />
      <span class="bg-gradient-to-r from-primary via-accent to-primary bg-clip-text text-transparent">
        Engineers
      </span>
    </h1>

    <!-- Subtitle -->
    <p
      @fadeUp
      class="text-lg sm:text-xl text-muted-foreground max-w-2xl mx-auto mb-10 leading-relaxed"
      style="font-family: 'Inter', sans-serif; animation-delay: 1s">
      Pioneering CCTV, biometric recognition, smart entrance management,
      and intelligent office solutions for the modern world.
    </p>

    <!-- CTA Buttons -->
    <div
      @fadeUp
      class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-16"
      style="animation-delay: 1.2s">
      <a
        href="#services"
        class="px-8 py-4 rounded-xl bg-primary text-primary-foreground font-bold text-sm tracking-wider uppercase hover:bg-primary/90 transition-all shadow-xl shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-0.5"
        style="font-family: 'Orbitron', sans-serif">
        Explore Solutions
      </a>
      <a
        href="#about"
        class="px-8 py-4 rounded-xl border border-border bg-card/30 backdrop-blur-sm text-foreground font-bold text-sm tracking-wider uppercase hover:bg-card/60 transition-all hover:-translate-y-0.5"
        style="font-family: 'Orbitron', sans-serif">
        Learn More
      </a>
    </div>

    <!-- Stats -->
    <div
      @fadeUp40
      class="grid grid-cols-3 gap-4 sm:gap-8 max-w-lg mx-auto"
      style="animation-delay: 1.5s">
      @for (stat of stats; track stat.label) {
        <div class="text-center">
          <lucide-icon [name]="getStatIconName(stat)" class="w-5 h-5 mx-auto mb-2 text-accent block" [size]="20"></lucide-icon>
          <div class="text-xs sm:text-sm font-bold text-foreground" style="font-family: 'Orbitron', sans-serif">
            {{ stat.value }}
          </div>
          <div class="text-[10px] sm:text-xs text-muted-foreground">{{ stat.label }}</div>
        </div>
      }
    </div>
  </div>

  <!-- Scroll indicator -->
  <div
    @fadeUp
    class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 scroll-indicator"
    style="animation-delay: 2s">
    <lucide-icon name="chevron-down" [size]="24" class="text-muted-foreground"></lucide-icon>
  </div>
</section>
