<section id="services" class="relative py-32">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" appAnimateInView [margin]="'-80px'" (inView)="onInView($event)">
    @if (inView()) {
      <div @fadeUp class="text-center mb-16">
        <span class="text-xs font-bold tracking-[0.3em] uppercase text-accent mb-4 block" style="font-family: 'Orbitron', sans-serif">
          Our Services
        </span>
        <h2 class="text-3xl sm:text-5xl font-black mb-4">
          What We
          <span class="bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">Deliver</span>
        </h2>
        <p class="text-muted-foreground max-w-xl mx-auto" style="font-family: 'Inter', sans-serif">
          Comprehensive security and smart technology solutions tailored for every scale.
        </p>
      </div>
    }

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (s of services; track s.title; let i = $index) {
        @if (inView()) {
          <div
            @cardUp
            class="group relative p-8 rounded-2xl border border-border bg-card/40 backdrop-blur-sm hover:bg-card/70 transition-all duration-500 hover:border-primary/30 hover:shadow-2xl hover:shadow-primary/10 hover:-translate-y-1 cursor-default overflow-hidden">
            <div [class]="'absolute inset-0 bg-gradient-to-br ' + s.gradient + ' opacity-0 group-hover:opacity-[0.04] transition-opacity duration-500 rounded-2xl'"></div>
            <div [class]="'inline-flex p-3 rounded-xl bg-gradient-to-br ' + s.gradient + ' mb-6'">
              <lucide-icon [name]="getServiceIconName(s)" class="w-6 h-6 text-foreground block" [size]="24"></lucide-icon>
            </div>
            <h3 class="text-lg font-bold mb-3 text-foreground" style="font-family: 'Orbitron', sans-serif">
              {{ s.title }}
            </h3>
            <p class="text-sm text-muted-foreground leading-relaxed" style="font-family: 'Inter', sans-serif">
              {{ s.description }}
            </p>
          </div>
        }
      }
    </div>
  </div>
</section>
