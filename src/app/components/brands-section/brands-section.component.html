<section id="brands" class="relative py-24 border-t border-border overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <span class="text-xs font-bold tracking-[0.3em] uppercase text-accent mb-2 block" style="font-family: 'Orbitron', sans-serif">
        Premium Partners
      </span>
      <h2 class="text-2xl sm:text-4xl font-black text-foreground mb-2" style="font-family: 'Orbitron', sans-serif">
        Brands We Supply
      </h2>
      <p class="text-muted-foreground text-sm max-w-xl mx-auto">Trusted manufacturers powering our security solutions</p>
    </div>

    <app-logo-carousel [items]="brands" />
  </div>
</section>
