name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href /

      - name: Add CNAME for custom domain
        run: echo "arkdengineers.com" > dist/arkd-angular/browser/CNAME

      - name: Add 404.html for SPA routing
        run: cp dist/arkd-angular/browser/index.html dist/arkd-angular/browser/404.html

      - name: Inject cache buster
        run: |
          BUILD_ID="${{ github.sha }}"
          sed -i "s/BUILD_ID/$BUILD_ID/g" dist/arkd-angular/browser/index.html dist/arkd-angular/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/arkd-angular/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
